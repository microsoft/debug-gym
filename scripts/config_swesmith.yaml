base:
    # Environment configs
    output_path: "exps/swesmith"
    uuid: "dev"
    benchmark: "swesmith"
    # problems: "all"  # lillst of problems, e.g., ["astropy__astropy-12907"], or "all"
    # problems: "test-128"  # list of problems, e.g., ["astropy__astropy-12907"], or "all"
    problems: ["spulec__freezegun.5f171db0.combine_file__f3rcc5ea"]
    env_kwargs: {
        "dir_tree_depth": 1,
        "run_on_rewrite": True,
        "auto_view_change": True,
        "run_timeout": 300,
        "dataset_id": "SWE-bench/SWE-smith"
    }
    terminal: {
        type: "docker",
    }
    persistent_breakpoints: True  # in pdb tool
    auto_list: True  # in pdb tool

    # LLM configs
    llm_name: "gpt-4o"

    # Agent configs
    random_seed: 42
    max_steps: 50
    max_rewrite_steps: 10
    memory_size: 20
    save_patch: True
    log_prompt_response_pairs: True
    reset_prompt_history_after_rewrite: True

solution:
    tools: ["eval"]

rewrite_agent:
    tools: ["eval", "view", "rewrite", "listdir"]

debug_agent:
    tools: ["eval", "pdb", "view", "rewrite", "listdir"]

debug_5_agent:
    n_rewrites_before_pdb: 5
    tools: ["eval", "pdb", "view", "rewrite", "listdir"]
