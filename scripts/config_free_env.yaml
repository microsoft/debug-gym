# Configuration for standalone FreeEnv + FreeAgent runs.
task_name: free-session

llm:
  name: "4o-az"

# Tools to load into the environment toolbox.
tools:
  - rewrite
  - bash
  - submit:
      apply_eval: False  # Here we only terminate after submission, no auto-eval.

environment:
  image: swesmith.x86_64.amueller__word_cloud.ec24191c
  workspace_dir: /testbed

agent:
  random_seed: 42
  max_steps: 20
  output_path: exps/free_env
